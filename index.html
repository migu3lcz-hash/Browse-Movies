<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Movies</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/db5b52d45d.js" crossorigin="anonymous"></script>
    
</head>
<body>
    <section id="search">
    <div class="nav__bar--img">
        <nav class="nav__bar--container row">
            <div class="nav__logo">
                <h1>Logo</h1>
            </div>
            <ul class="nav__links">
                <li><a href="#search" class="nav__link link__hover--effect">Home</a></li>
                <li><a href="#search" class="nav__link link__hover--effect">Find your Movie</a></li>
                <li><a href="#" class="nav__link contact">Contact</a></li>
            </ul>
        </nav>
        <div class="search__container">
            <h1 class="title">Browse our Movies</h1>
            <div class="search__input--container">
                <input  id="search-input" type="text" class="search__input" placeholder="Search for a movie...">
                <div class="search__icon--wrapper">
                    <i class="fa-solid fa-magnifying-glass click click-movie"></i>
                </div>
            </div>
        </div>
    </div>
    </section>
    <section id="search__results">
        <div class="search__top--container">
            <h1 class="search__title">
                Search Results for:<br><span id="search-term"></span>
            </h1>
            <div class="search__filter">
                <label for="filter-select">Filter by:</label>
                <select id="filter-select" onchange="filterMovies(event)">
                    <option value="" disabled selected>Sort</option>
                    <option value="alpha">A - Z</option>
                    <option value="reverse">Z - A</option>
                    <option value="newest">Newest to Oldest</option>
                    <option value="oldest">Oldest to Newest</option>
                </select>
            </div>
        </div>
        <div class="search__results--container">
            <div class="search__result--container">
                <div class="search__result--img">
                    <img src="" alt="">
                </div>
                <div class="search__result--title">
                    <h1 class="movie__title"></h1>
                </div>
            </div>
        </div>
    </section>
    <footer>
        <ul class="footer__links row">
            <li><a href="#search" class="nav__link link__hover--effect">Home</a></li>
            <li><a href="#search" class="nav__link link__hover--effect">Find your Movie</a></li>
            <li><a href="#" class="nav__link link__hover--effect">Contact</a></li>
        </ul>
        <h1 class="footer__logo">Logo</h1>
        <p class="copy-right">&copy; 2024 Movie Browser. All rights reserved.</p>
    </footer>
<script src="index.js"></script>
</body>
</html>
